<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article — Kamyl</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

  <style>
    :root {
      --bg: #f8f7f4; --bg-2: #f0ede8; --surface: #ffffff;
      --border: #e2ddd7; --text: #1a1a18; --text-2: #5a5750; --text-3: #8a8580;
      --accent: #1a1a18;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --radius: 4px; --radius-lg: 8px;
    }
    [data-theme="dark"] {
      --bg: #111110; --bg-2: #1a1918; --surface: #1f1e1d;
      --border: #2e2c2a; --text: #f0ede8; --text-2: #a8a49e; --text-3: #6b6762;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-body); font-size: 15px; line-height: 1.7;
      font-weight: 300; transition: background 0.3s, color 0.3s;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 0 48px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      transition: background 0.3s;
    }
    .nav-back {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-2); transition: color 0.2s;
    }
    .nav-back:hover { color: var(--text); }
    .nav-name {
      font-family: var(--font-display); font-size: 17px;
      font-weight: 500; color: var(--text);
    }
    .theme-toggle {
      background: none; border: 1px solid var(--border);
      width: 32px; height: 32px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-2); font-size: 14px; transition: all 0.2s;
    }
    .theme-toggle:hover { border-color: var(--text-2); color: var(--text); }

    /* ARTICLE LAYOUT */
    .article-wrap {
      max-width: 720px; margin: 0 auto;
      padding: 96px 48px 80px;
    }

    /* META */
    .article-meta {
      margin-bottom: 48px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 32px;
    }
    .article-category {
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-3); margin-bottom: 16px;
    }
    .article-headline {
      font-family: var(--font-display);
      font-size: clamp(32px, 5vw, 52px); font-weight: 300;
      line-height: 1.1; color: var(--text);
      margin-bottom: 16px;
    }
    .article-info {
      display: flex; gap: 20px; align-items: center;
      font-size: 12px; color: var(--text-3);
    }
    .reading-time { letter-spacing: 0.04em; }

    /* MARKDOWN CONTENT */
    .article-content h1 {
      font-family: var(--font-display); font-size: 36px; font-weight: 300;
      color: var(--text); margin: 48px 0 20px; line-height: 1.2;
    }
    .article-content h2 {
      font-family: var(--font-display); font-size: 26px; font-weight: 400;
      color: var(--text); margin: 40px 0 16px; line-height: 1.3;
    }
    .article-content h3 {
      font-size: 15px; font-weight: 500; color: var(--text);
      margin: 28px 0 12px; letter-spacing: 0.02em;
    }
    .article-content p {
      font-size: 15px; color: var(--text-2); line-height: 1.85;
      margin-bottom: 20px; font-weight: 300;
    }
    .article-content strong { color: var(--text); font-weight: 500; }
    .article-content em { font-style: italic; color: var(--text-2); }
    .article-content ul, .article-content ol {
      padding-left: 0; margin-bottom: 20px;
    }
    .article-content ul li, .article-content ol li {
      font-size: 15px; color: var(--text-2); line-height: 1.7;
      margin-bottom: 8px; padding-left: 20px; position: relative;
    }
    .article-content ul li::before {
      content: ''; position: absolute; left: 0; top: 11px;
      width: 6px; height: 1px; background: var(--text-3);
    }
    .article-content ol { counter-reset: item; }
    .article-content ol li { counter-increment: item; }
    .article-content ol li::before {
      content: counter(item) '.'; position: absolute; left: 0;
      font-size: 12px; color: var(--text-3);
    }
    .article-content img {
      width: 100%; border-radius: var(--radius-lg);
      margin: 32px 0; border: 1px solid var(--border);
    }
    .article-content hr {
      border: none; border-top: 1px solid var(--border); margin: 40px 0;
    }
    .article-content blockquote {
      border-left: 2px solid var(--border);
      padding: 12px 20px; margin: 24px 0;
      color: var(--text-2); font-style: italic;
    }
    .article-content code {
      background: var(--bg-2); padding: 2px 6px;
      border-radius: var(--radius); font-size: 13px;
    }
    .article-content pre {
      background: var(--bg-2); padding: 20px; border-radius: var(--radius-lg);
      overflow-x: auto; margin: 24px 0;
    }
    .article-content a {
      border-bottom: 1px solid var(--border); transition: border-color 0.2s;
    }
    .article-content a:hover { border-color: var(--text); }

    /* ERROR / LOADING */
    .article-error, .article-loading {
      text-align: center; padding: 80px 0;
      color: var(--text-3); font-size: 13px;
    }
    .article-error a {
      color: var(--text-2); border-bottom: 1px solid var(--border);
    }

    /* BACK BOTTOM */
    .article-back-bottom {
      margin-top: 64px; padding-top: 32px;
      border-top: 1px solid var(--border);
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-2); border: 1px solid var(--border);
      padding: 10px 20px; border-radius: var(--radius);
      transition: all 0.2s;
    }
    .back-link:hover { border-color: var(--text); color: var(--text); }

    @media (max-width: 768px) {
      nav { padding: 0 24px; }
      .article-wrap { padding: 80px 24px 60px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html#activities" class="nav-back">← Activities</a>
  <a href="index.html" class="nav-name">Kamyl</a>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">☀</button>
</nav>

<div class="article-wrap">
  <div id="articleMeta" class="article-meta" style="display:none;">
    <div class="article-category" id="articleCategory"></div>
    <h1 class="article-headline" id="articleHeadline"></h1>
    <div class="article-info">
      <span id="articleDate"></span>
      <span>·</span>
      <span class="reading-time" id="readingTime"></span>
    </div>
  </div>

  <div id="articleLoading" class="article-loading">Loading article...</div>
  <div id="articleError" class="article-error" style="display:none;">
    Article not found. <a href="index.html#activities">Return to Activities</a>
  </div>
  <div id="articleContent" class="article-content" style="display:none;"></div>

  <div class="article-back-bottom">
    <a href="index.html#activities" class="back-link">← Back to Activities</a>
  </div>
</div>

<script src="data.js"></script>
<script>
  // Theme
  const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', saved);
  const toggle = document.getElementById('themeToggle');
  toggle.textContent = saved === 'dark' ? '☀' : '☾';
  toggle.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    toggle.textContent = next === 'dark' ? '☀' : '☾';
  });

  // Get slug from URL
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');

  function calcReadingTime(text) {
    const wpm = 200;
    const words = text.trim().split(/\s+/).length;
    const mins = Math.ceil(words / wpm);
    return `${mins} min read`;
  }

  async function loadArticle() {
    if (!slug) {
      showError(); return;
    }

    const activity = PORTFOLIO_DATA.activities.find(a => a.slug === slug);
    if (!activity) { showError(); return; }

    // Set OG/page title
    document.title = `${activity.title} — Kamyl`;

    // Populate meta
    document.getElementById('articleCategory').textContent = activity.category;
    document.getElementById('articleHeadline').textContent = activity.title;
    document.getElementById('articleDate').textContent = activity.date;

    try {
      const res = await fetch(`content/${slug}.md`);
      if (!res.ok) throw new Error('Not found');
      const md = await res.text();

      // Configure marked
      marked.setOptions({
        breaks: true,
        gfm: true
      });

      const html = marked.parse(md);

      document.getElementById('readingTime').textContent = calcReadingTime(md);
      document.getElementById('articleMeta').style.display = 'block';
      document.getElementById('articleContent').innerHTML = html;
      document.getElementById('articleContent').style.display = 'block';
      document.getElementById('articleLoading').style.display = 'none';
    } catch (e) {
      showError();
    }
  }

  function showError() {
    document.getElementById('articleLoading').style.display = 'none';
    document.getElementById('articleError').style.display = 'block';
  }

  loadArticle();
</script>
</body>
</html>
